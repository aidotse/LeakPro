audit:  # Configurations for auditing
  random_seed: 1234
  attack_list:
    - attack: lira
      online: False
      num_shadow_models: 8
      training_data_fraction: 0.5
      var_calculation: "fixed"
    - attack: rmia
      online: True
      num_shadow_models: 8
      training_data_fraction: 0.5
    - attack: population
      attack_data_fraction: 1.0
  output_dir: "./leakpro_output"
  attack_type: "mia"  # mia, gia
  data_modality: "tabular"  # image, tabular

target:
  module_path: "utils/gdd_model.py"
  model_class: "GddMLP"
  target_folder: "./target"
  data_path: "./data/gdd_ens.pkl"

shadow_model:

distillation_model:
