audit: # Configurations for auditing
  random_seed: 42 # Integer specifying the random seed
  attack_list: 

    # DTS Inception
    - attack: dts
      num_shadow_models: 64
      online: True
      clf_model: "InceptionTime"
      clf_model_kwargs:
        # kernel_sizes: [20, 15, 10]  # will overide max_kernel_size
        max_kernel_size: 15
        # If neither kernel_sizes or max_kernel_size is set kernel_sizes will be set based on seq_length:
        # [2, 4, 8] if seq_length < 81 else [10, 20, 40]
      clf_batch_size: 512
      clf_max_epochs: 64

